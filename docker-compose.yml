services:
  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    env_file:
      - bot/.env
    environment:
      DATABASE_URL: postgres://peanut:peanut@postgresql:5432/peanut
    depends_on:
      postgresql:
        condition: service_healthy
    init: true
    restart: unless-stopped

  deploy:
    build:
      context: .
      dockerfile: bot/Dockerfile
    command: pnpm run deploy
    env_file:
      - bot/.env
    profiles:
      - tools

  postgresql:
    image: postgres:17
    environment:
      POSTGRES_DB: peanut
      POSTGRES_USER: peanut
      POSTGRES_PASSWORD: peanut
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U peanut -d peanut"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  adminer:
    image: adminer:latest
    ports:
      - "8080:8080"
    depends_on:
      - postgresql
    profiles:
      - tools

volumes:
  postgres-data:
